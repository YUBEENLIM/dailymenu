spring:
  application:
    name: dailymenu
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

# Tomcat 스레드 제한 (CPU 과포화 방어)
# max-threads: 동시 처리 스레드 수 (기본 200 → 150 제한)
# accept-count: 모든 스레드 사용 중일 때 큐 대기 수 (초과 시 connection refused)
server:
  tomcat:
    threads:
      max: 150
    accept-count: 100

# Actuator + Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: dailymenu

# Rate Limit (api-spec.md §2)
rate-limit:
  apis:
    recommendations:
      per-minute: 5
      per-hour: 20
    meal-histories:
      per-minute: 10
      per-hour: 0
    restaurants:
      per-minute: 30
      per-hour: 0

# JWT (api-spec.md §2: Access Token 1시간, Refresh Token 7일)
jwt:
  secret: ZGFpbHltZW51LWp3dC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LTI1Ng== # 개발용. 운영은 환경변수로 주입.
  access-token-expiration: 3600    # 1시간 (초)
  refresh-token-expiration: 604800 # 7일 (초)

# 카카오맵 API (architecture.md §8: connection 500ms, read 1500ms)
kakao:
  place:
    api-key: ${KAKAO_REST_API_KEY:your-kakao-rest-api-key}  # 환경변수로 주입. 로컬은 .env 또는 IDE 설정 사용.
    base-url: https://dapi.kakao.com
    connection-timeout: 500   # ms
    read-timeout: 1500        # ms
    default-radius: 500       # 미터 (기본 탐색 반경)
  oauth:
    client-id: ${KAKAO_REST_API_KEY:your-kakao-rest-api-key}
    client-secret: ${KAKAO_CLIENT_SECRET:}  # 카카오 콘솔에서 클라이언트 시크릿 비활성화 시 빈 값
    redirect-uri: http://localhost:8080/auth/kakao/callback